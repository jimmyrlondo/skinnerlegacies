<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skinner Legacies Intake Access</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <script>window.SL_AUTH_CONFIG={mode:'login',successPath:'app.html'};</script>
    <script src="js/auth-gate.js" defer></script>
    <style>
        :root {
            color-scheme: light;
            --navy: #0f172a;
            --navy-soft: #1e293b;
            --gold: #d4af37;
            --ink: #1f2937;
            --line: #cbd5e1;
            --card: #ffffff;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg, #f8fafc, #e2e8f0 55%, #f8f0cf);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .shell {
            width: min(560px, 100%);
            overflow: hidden;
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
            border: 1px solid rgba(212,175,55,0.18);
        }
        .panel { padding: 40px; background: var(--card); }
        .brand-banner {
            display: block;
            width: min(100%, 360px);
            margin: 0 auto 24px;
            height: auto;
        }
        .panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.6rem;
            color: var(--navy);
            text-align: center;
        }
        form { display: grid; gap: 14px; }
        label { font-weight: 600; font-size: 0.95rem; }
        input {
            width: 100%;
            margin-top: 6px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
            font: inherit;
        }
        input:focus {
            outline: 3px solid rgba(212,175,55,0.24);
            border-color: var(--gold);
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--navy), var(--navy-soft));
            color: #fff;
            font: 700 1rem/1.2 inherit;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.08); }
        .error {
            border-radius: 12px;
            padding: 12px 14px;
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            margin-bottom: 8px;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 22px;
            justify-content: center;
        }
        .links a {
            color: var(--navy-soft);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <img src="../images/logobannertransparent.png" alt="Skinner Legacies banner logo" class="brand-banner">
            <h2>Sign in to continue</h2>
            <div id="sl-login-error" class="error" hidden>Incorrect username or password. Please try again.</div>
            <form id="sl-login-form">
                <label>
                    Username
                    <input id="sl-username" name="username" type="text" autocomplete="username" required>
                </label>
                <label>
                    Password
                    <input id="sl-password" name="password" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Enter Skinner Legacies</button>
            </form>
            <div class="links">
                <a href="/">← Back to Skinner Legacies</a>
            </div>
        </section>
    </main>
</body>
</html>
