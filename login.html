<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skinner Legacies | Login</title>
    <meta
      name="description"
      content="Placeholder login page for the future Skinner Legacies web application."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-info" aria-label="Login introduction">
        <p class="eyebrow">Future member access</p>
        <h1>Welcome to Skinner Legacies</h1>
        <p>
          This standalone page is reserved as the future entry point for secure application login.
          It is currently a visual placeholder while account workflows are in development.
        </p>
      </section>
      <section class="login-form" aria-label="Login form placeholder">
        <h2>Sign In</h2>
        <form action="#" method="post">
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="form-row">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button class="button button--primary" type="submit">Continue</button>
          <p class="form-note">Authentication is not active yet. Access logic will be added later.</p>
        </form>
      </section>
    </main>
  </body>
</html>
